<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automaty – Gamba</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="deposit-btn" onclick="openDeposit()">💵 Vklad</button>
  <a href="../index.html" class="back-btn">🏠 Menu</a>

  <div id="deposit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>💰 Vklad mincí</h2>
      <p>Zadejte částku (min 100 – max 5000)</p>
      <input type="number" id="deposit-input" min="100" max="5000" placeholder="např. 500">
      <div id="deposit-error" class="modal-error"></div>
      <div class="modal-buttons">
        <button onclick="confirmDeposit()">Potvrdit</button>
        <button class="cancel" onclick="closeDeposit()">Zrušit</button>
      </div>
    </div>
  </div>

  <h1>🎰 Automaty 🎰</h1>

  <div class="coins">💰 <span id="coins">0</span> mincí</div>

  <div class="game-card" style="width: 100%; max-width: 450px;">
    <div class="machine-select">
      <button class="active" onclick="selectMachine(0)">🍒 Ovoce</button>
      <button onclick="selectMachine(1)">🐱 Zvířátka</button>
      <button onclick="selectMachine(2)">👑 Vegas</button>
    </div>

    <div class="reels">
      <div class="reel" id="r0">🍒</div>
      <div class="reel" id="r1">🍋</div>
      <div class="reel" id="r2">🍉</div>
    </div>

    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
      <button id="spin-btn" class="action-btn" onclick="spin()">ZATOČIT (50)</button>
      <button id="auto-btn" class="action-btn auto-btn" onclick="toggleAutoSpin()">AUTO (50)</button>
    </div>
    <div id="result"></div>
  </div>

  <script src="../shared.js"></script>
  <script src="maty.js"></script>
</body>
</html>
