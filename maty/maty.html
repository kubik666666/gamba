<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="deposit-btn" id="deposit-btn" onclick="openDeposit()">💵 Deposit</button>

  <!-- Deposit Modal -->
  <div id="deposit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>💰 Deposit Coins</h2>
      <p>Enter amount (min 100 – max 5000)</p>
      <input type="number" id="deposit-input" min="100" max="5000" placeholder="e.g. 500">
      <div id="deposit-error" class="modal-error"></div>
      <div class="modal-buttons">
        <button onclick="confirmDeposit()">Confirm</button>
        <button class="cancel" onclick="closeDeposit()">Cancel</button>
      </div>
    </div>
  </div>

  <h1>🎰 Slot Machine 🎰</h1>

  <div class="machine-select">
    <button class="active" onclick="selectMachine(0)">Machine 1</button>
    <button onclick="selectMachine(1)">Machine 2</button>
    <button onclick="selectMachine(2)">Machine 3</button>
  </div>

  <div class="coins">💰 <span id="coins">1000</span> coins</div>

  <div class="slot-machine">
    <div class="reels">
      <div class="reel" id="r0">🍒</div>
      <div class="reel" id="r1">🍋</div>
      <div class="reel" id="r2">🍉</div>
    </div>
    <button id="spin-btn" onclick="spin()">SPIN</button>
    <div id="result"></div>
  </div>

  <script src="maty.js"></script>
</body>
</html>
