<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roulette – Gamba</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <button class="deposit-btn" onclick="openDeposit()">💵 Deposit</button>
  <a href="../index.html" class="back-btn">🏠 Menu</a>


  <div id="deposit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>💰 Deposit Coins</h2>
      <p>Enter amount (min 100 – max 5000)</p>
      <input type="number" id="deposit-input" min="100" max="5000" placeholder="e.g. 500">
      <div id="deposit-error" class="modal-error"></div>
      <div class="modal-buttons">
        <button onclick="confirmDeposit()">Confirm</button>
        <button class="cancel" onclick="closeDeposit()">Cancel</button>
      </div>
    </div>
  </div>

  <h1>🎡 Roulette 🎡</h1>

  <div class="coins">💰 <span id="coins">0</span> coins</div>

  <div class="game-card">
    <div class="roulette-wheel" id="wheel">🎡</div>

    <div class="bet-options">
      <button class="bet-option red"   onclick="selectBet('red')"  >🔴 Red (2×)</button>
      <button class="bet-option black" onclick="selectBet('black')">⚫ Black (2×)</button>
      <button class="bet-option green" onclick="selectBet('green')">🟢 Green (35×)</button>
    </div>

    <div class="bet-row">
      <label for="bet-amount">Bet:</label>
      <input type="number" id="bet-amount" min="10" max="5000" value="50" placeholder="50">
    </div>

    <button id="spin-btn" class="action-btn" onclick="spinRoulette()">SPIN</button>
    <div id="roulette-result"></div>
  </div>

  <script src="../shared.js"></script>
  <script src="ruleta.js"></script>
</body>
</html>
