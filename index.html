<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasino Gamba</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="deposit-btn" onclick="openDeposit()">💵 Vklad</button>

  <div id="deposit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>💰 Vklad mincí</h2>
      <p>Zadejte částku (min 100 – max 5000)</p>
      <input type="number" id="deposit-input" min="100" max="5000" placeholder="např. 500">
      <div id="deposit-error" class="modal-error"></div>
      <div class="modal-buttons">
        <button onclick="confirmDeposit()">Potvrdit</button>
        <button class="cancel" onclick="closeDeposit()">Zrušit</button>
      </div>
    </div>
  </div>

  <h1>🎰 Kasino Gamba 🎰</h1>

  <div class="coins">💰 <span id="coins">0</span> mincí</div>

  <div class="games-grid">
    <a href="maty/maty.html" class="game-link">
      <span class="icon">🎰</span>
      <span class="name">Automaty</span>
    </a>
    <a href="ruleta/ruleta.html" class="game-link">
      <span class="icon">🎡</span>
      <span class="name">Ruleta</span>
    </a>
    <a href="coinflip/coinflip.html" class="game-link">
      <span class="icon">🪙</span>
      <span class="name">Hod mincí</span>
    </a>
    <a href="cases/cases.html" class="game-link">
      <span class="icon">📦</span>
      <span class="name">cs caseky</span>
    </a>
    <a href="sazeni/sazeni.html" class="game-link">
      <span class="icon">🎫</span>
      <span class="name">Sázení</span>
    </a>
  </div>

  <script src="shared.js"></script>
</body>
</html>
