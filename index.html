<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamba Casino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="deposit-btn" onclick="openDeposit()">💵 Deposit</button>

  <!-- Deposit Modal -->
  <div id="deposit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>💰 Deposit Coins</h2>
      <p>Enter amount (min 100 – max 5000)</p>
      <input type="number" id="deposit-input" min="100" max="5000" placeholder="e.g. 500">
      <div id="deposit-error" class="modal-error"></div>
      <div class="modal-buttons">
        <button onclick="confirmDeposit()">Confirm</button>
        <button class="cancel" onclick="closeDeposit()">Cancel</button>
      </div>
    </div>
  </div>

  <h1>🎰 Gamba Casino 🎰</h1>

  <div class="coins">💰 <span id="coins">0</span> coins</div>

  <div class="games-grid">
    <a href="maty/maty.html" class="game-link">
      <span class="icon">🎰</span>
      <span class="name">Slots</span>
    </a>
    <a href="ruleta/ruleta.html" class="game-link">
      <span class="icon">🎡</span>
      <span class="name">Roulette</span>
    </a>
    <a href="coinflip/coinflip.html" class="game-link">
      <span class="icon">🪙</span>
      <span class="name">Coinflip</span>
    </a>
  </div>

  <script src="shared.js"></script>
</body>
</html>
