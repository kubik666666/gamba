<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cases – Gamba</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <button class="deposit-btn" onclick="openDeposit()">💵 Deposit</button>
  <a href="../index.html" class="back-btn">🏠 Menu</a>


  <div id="deposit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>💰 Deposit Coins</h2>
      <p>Enter amount (min 100 – max 5000)</p>
      <input type="number" id="deposit-input" min="100" max="5000" placeholder="e.g. 500">
      <div id="deposit-error" class="modal-error"></div>
      <div class="modal-buttons">
        <button onclick="confirmDeposit()">Confirm</button>
        <button class="cancel" onclick="closeDeposit()">Cancel</button>
      </div>
    </div>
  </div>

  <h1>📦 Open Cases 📦</h1>

  <div class="coins">💰 <span id="coins">0</span> coins</div>

  <div class="game-card">

    <div class="case-select">
      <button class="active" onclick="selectCase(0)">Bronze (100)</button>
      <button onclick="selectCase(1)">Silver (250)</button>
      <button onclick="selectCase(2)">Gold (500)</button>
    </div>

    <div class="case-viewport">
      <div class="case-pointer">▼</div>
      <div class="case-strip" id="case-strip"></div>
    </div>

    <button id="open-btn" class="action-btn" onclick="openCase()">OPEN CASE</button>
    <div id="case-result"></div>
  </div>

  <script src="../shared.js"></script>
  <script src="cases.js"></script>
</body>
</html>
