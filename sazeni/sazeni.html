<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurzové Sázení – Gamba</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="sazeni.css">
</head>
<body>

  <button class="deposit-btn" onclick="openDeposit()">💵 Vklad</button>
  <a href="../index.html" class="back-btn">🏠 Menu</a>

  <div id="deposit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>💰 Vklad mincí</h2>
      <p>Zadejte částku (min 100 – max 5000)</p>
      <input type="number" id="deposit-input" min="100" max="5000" placeholder="např. 500">
      <div id="deposit-error" class="modal-error"></div>
      <div class="modal-buttons">
        <button onclick="confirmDeposit()">Potvrdit</button>
        <button class="cancel" onclick="closeDeposit()">Zrušit</button>
      </div>
    </div>
  </div>

  <h1>🎫 Kurzové Sázení 🎫</h1>

  <div class="coins">💰 <span id="coins">0</span> mincí</div>

  <div class="sports-tabs">
    <button class="sport-tab-btn active" onclick="switchSport('fotbal')">⚽ Fotbal</button>
    <button class="sport-tab-btn" onclick="switchSport('hokej')">🏒 Hokej</button>
  </div>

  <div class="matches-list" id="matches-list"></div>

  <div class="bet-panel">
    <div class="bet-summary" id="bet-summary">
      Vyberte zápas a kurz na lístek.
    </div>

    <div class="bet-row">
      <label for="sazeni-bet">Částka:</label>
      <input type="number" id="sazeni-bet" min="10" max="5000" value="50" placeholder="50">
    </div>

    <button id="sazeni-btn" class="action-btn" onclick="placeBet()" disabled>VSADIT A VYHODNOTIT</button>

    <div id="sazeni-result-box" class="sazeni-result-box" style="display: none;">
      <div id="result-score" class="result-score"></div>
      <div id="result-text"></div>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script src="sazeni.js"></script>
</body>
</html>
